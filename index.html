<!DOCTYPE html>
<html lang="ka" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>AutoMarket | მთავარი</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AUTO<span>MARKET</span></div>
        <ul class="nav-links">
            <li><a href="index.html">მთავარი</a></li>
            <li><a href="catalog.html">კატალოგი</a></li>
            <li><i class="fas fa-moon theme-toggle" id="themeBtn"></i></li>
            <li><a onclick="toggleModal('sellModal')" class="btn-sell">გაყიდე</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>ავტომობილების პრემიუმ ბაზარი</h1>
        <p>საუკეთესო შემოთავაზებები ერთ სივრცეში</p>
    </section>

    <main class="container">
        <h2 class="section-title">პოპულარული მოდელები</h2>
        <div class="car-grid" id="popularContainer">
            </div>
    </main>

    <div id="sellModal" class="full-modal">
        <div class="modal-box">
            <span class="close-modal" onclick="toggleModal('sellModal')">&times;</span>
            <h2>განცხადების დამატება</h2>
            <form id="sellForm">
                <input type="text" id="mModel" placeholder="მოდელი" required>
                <input type="number" id="mPrice" placeholder="ფასი ($)" required>
                <input type="tel" id="mPhone" placeholder="ტელეფონი" required>
                <input type="file" id="mFile" accept="image/*">
                <button type="submit" id="subBtn" class="submit-btn" disabled>ატვირთვა</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyCx2sZJQqP8ni_dz9fuhJwKWJrHnKRjGdE",
            databaseURL: "https://automarket-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "automarket-2026",
            appId: "1:689194639330:web:db854d0dbfddded899a3bb"
        };
        const app = initializeApp(config);
        const db = getDatabase(app);

        // პოპულარულების გენერაცია
        const populars = [
            {m: "Mercedes CLS W218", p: "35,000", i: "https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?q=80&w=500", d: "4.7L V8 Biturbo"},
            {m: "BMW M5 E60", p: "28,000", i: "https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=500", d: "5.0L V10 S85"},
            {m: "BMW M4 G82", p: "75,000", i: "https://images.unsplash.com/photo-1617531653332-bd46c24f2068?q=80&w=500", d: "3.0L S58"},
            {m: "Bugatti La Voiture", p: "18,000,000", i: "https://images.unsplash.com/photo-1544636331-e26879cd4d9b?q=80&w=500", d: "8.0L W16"},
            {m: "Porsche 911 GT3 RS", p: "350,000", i: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=500", d: "4.0L Flat-6"},
            {m: "Mercedes W211 E63", p: "18,000", i: "https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?q=80&w=500", d: "6.2L V8"},
            {m: "Mercedes CLS W219", p: "15,000", i: "https://images.unsplash.com/photo-1617814076668-8dfc6fe157c7?q=80&w=500", d: "5.5L AMG"}
        ];

        const container = document.getElementById('popularContainer');
        container.innerHTML = populars.map(c => `
            <div class="car-card">
                <div class="car-img" style="background-image:url('${c.i}')">
                    <div class="overlay">
                        <ul><li><strong>ძრავი:</strong> ${c.d}</li><li><strong>საწვავი:</strong> ბენზინი</li></ul>
                    </div>
                </div>
                <div class="car-details"><h3>${c.m}</h3><p class="car-price">${c.p} $</p></div>
            </div>
        `).join('');

        // ატვირთვის ლოგიკა
        const fileIn = document.getElementById('mFile');
        fileIn.onchange = async (e) => {
            const fd = new FormData(); fd.append('image', e.target.files[0]);
            const res = await fetch('https://api.imgbb.com/1/upload?key=288f0f93fa8f453cc70cb272d0e7480f', {method:'POST', body:fd});
            const d = await res.json();
            if(d.success) { window.finalUrl = d.data.url; document.getElementById('subBtn').disabled = false; }
        };

        document.getElementById('sellForm').onsubmit = (e) => {
            e.preventDefault();
            push(ref(db, 'cars'), {
                model: document.getElementById('mModel').value,
                price: Number(document.getElementById('mPrice').value),
                phone: document.getElementById('mPhone').value,
                image: window.finalUrl
            }).then(() => location.href = "catalog.html");
        };
    </script>
    <script>
        function toggleModal(id) { const m = document.getElementById(id); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
        document.getElementById('themeBtn').onclick = () => {
            const d = document.documentElement;
            const isD = d.getAttribute('data-theme') === 'dark';
            d.setAttribute('data-theme', isD ? 'light' : 'dark');
        };
    </script>
</body>
</html>
