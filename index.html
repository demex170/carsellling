<!DOCTYPE html>
<html lang="ka" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMarket | Premium Main</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">AUTO<span>MARKET</span></div>
            <ul class="nav-links">
                <li><a href="index.html">მთავარი</a></li>
                <li><a href="catalog.html">კატალოგი</a></li>
                <li><i class="fas fa-moon theme-toggle" id="themeBtn"></i></li>
                <li><a href="javascript:void(0)" onclick="toggleModal('sellModal')" class="btn-sell">გაყიდე მანქანა</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>ავტო ბაზარი</h1>
            <div class="live-stats"><span id="totalCars">0</span> მანქანა გაყიდვაში</div>
        </div>
    </section>

    <section class="popular-cars container">
        <h2 class="section-title">პოპულარული მოდელები</h2>
        <div class="pop-grid">
            <div class="pop-card">
                <div class="pop-img" style="background-image: url('cls.jpg');">
                    <div class="pop-overlay">
                        <p class="car-bio">პრემიუმ კლასის ოთხკარიანი კუპე.</p>
                        <ul>
                            <li><strong>წელი:</strong> 2014</li>
                            <li><strong>ძრავი:</strong> 4.7L V8</li>
                            <li><strong>ფასი:</strong> $35,000</li>
                        </ul>
                    </div>
                </div>
                <div class="pop-info"><h3>Mercedes CLS W218</h3></div>
            </div>
            </div>
    </section>

    <div id="sellModal" class="full-modal">
        <div class="modal-box small-modal">
            <span class="close-modal" onclick="toggleModal('sellModal')">&times;</span>
            <h2>განცხადების დამატება</h2>
            <form id="carForm">
                <div class="field"><input type="text" id="model" placeholder="მოდელი (მაგ: BMW M5)" required></div>
                <div class="field"><input type="number" id="price" placeholder="ფასი ($)" required></div>
                <div class="field"><input type="tel" id="phone" placeholder="ტელეფონი" required></div>
                <div class="field">
                    <select id="condition">
                        <option value="ახალი">ახალი</option>
                        <option value="მეორადი">მეორადი</option>
                    </select>
                </div>
                <div class="field">
                    <input type="file" id="imageInput" accept="image/*">
                    <img id="preview" style="display:none; width:100%; margin-top:10px; border-radius:10px; border: 1px solid #ff3e3e;">
                </div>
                <button type="submit" id="submitBtn" class="submit-btn" disabled>განთავსება</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx2sZJQqP8ni_dz9fuhJwKWJrHnKRjGdE",
            databaseURL: "https://automarket-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "automarket-2026",
            appId: "1:689194639330:web:db854d0dbfddded899a3bb"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Stats
        onValue(ref(db, 'cars'), s => document.getElementById('totalCars').innerText = s.val() ? Object.keys(s.val()).length : 0);

        // Theme
        const themeBtn = document.getElementById('themeBtn');
        themeBtn.onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeBtn.className = isDark ? 'fas fa-sun theme-toggle' : 'fas fa-moon theme-toggle';
        };

        // Preview & Upload
        const imgInput = document.getElementById('imageInput');
        imgInput.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('preview').src = URL.createObjectURL(file);
            document.getElementById('preview').style.display = "block";
            
            const fd = new FormData(); fd.append('image', file);
            const res = await fetch('https://api.imgbb.com/1/upload?key=288f0f93fa8f453cc70cb272d0e7480f', {method:'POST', body:fd});
            const d = await res.json();
            if(d.success) { window.finalImg = d.data.url; document.getElementById('submitBtn').disabled = false; }
        };

        window.toggleModal = id => { const m = document.getElementById(id); m.style.display = (m.style.display === "flex") ? "none" : "flex"; };

        document.getElementById('carForm').onsubmit = (e) => {
            e.preventDefault();
            push(ref(db, 'cars'), {
                model: document.getElementById('model').value,
                price: Number(document.getElementById('price').value),
                phone: document.getElementById('phone').value,
                condition: document.getElementById('condition').value,
                image: window.finalImg,
                date: new Date().toLocaleDateString(),
                isVIP: false
            }).then(() => window.location.href = "catalog.html");
        };
    </script>
</body>
</html>
