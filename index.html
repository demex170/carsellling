<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMarket | Live Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">AUTO<span>MARKET</span></div>
            <ul class="nav-links">
                <li><a href="#">მთავარი</a></li>
                <li><a href="#catalog">კატალოგი</a></li>
                <li><a href="#sell" class="btn-sell">გაყიდე მანქანა</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>იპოვე და გაყიდე ავტომობილი</h1>
            <p>განცხადებები ემატება რეალურ დროში</p>
        </div>
    </section>

    <section id="sell" class="form-section">
        <div class="container">
            <div class="form-card">
                <h2>განცხადების დამატება</h2>
                <form id="carForm">
                    <div class="input-group">
                        <div class="field">
                            <label>მოდელი</label>
                            <input type="text" id="model" placeholder="მაგ: BMW M4" required>
                        </div>
                        <div class="field">
                            <label>ფასი ($)</label>
                            <input type="number" id="price" placeholder="მაგ: 35000" required>
                        </div>
                    </div>

                    <div class="field">
                        <label>ფოტოს ატვირთვა</label>
                        <input type="file" id="imageInput" accept="image/*" class="file-input">
                        <p id="uploadStatus">ჯერ აირჩიეთ ფოტო</p>
                    </div>

                    <div class="field">
                        <label>აღწერა</label>
                        <textarea id="description" rows="3" placeholder="მოკლე ინფორმაცია..."></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="submit-btn" disabled>გამოქვეყნება</button>
                </form>
            </div>
        </div>
    </section>

    <section id="catalog" class="car-grid-section">
        <div class="container">
            <h2 class="section-title">აქტიური განცხადებები</h2>
            <div id="carGrid" class="car-grid">
                <p id="loadingText">იტვირთება განცხადებები...</p>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // შენი კონფიგურაცია
        const firebaseConfig = {
            apiKey: "AIzaSyCx2sZJQqP8ni_dz9fuhJwKWJrHnKRjGdE",
            authDomain: "automarket-2026.firebaseapp.com",
            databaseURL: "https://automarket-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "automarket-2026",
            storageBucket: "automarket-2026.firebasestorage.app",
            messagingSenderId: "689194639330",
            appId: "1:689194639330:web:db854d0dbfddded899a3bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const carsRef = ref(db, 'cars');

        let uploadedImageUrl = "";

        // ImgBB-ზე ატვირთვა (როგორც ადრე)
        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const status = document.getElementById('uploadStatus');
            status.innerText = "ფოტო იტვირთება...";
            
            const formData = new FormData();
            formData.append('image', file);

            const res = await fetch('https://api.imgbb.com/1/upload?key=288f0f93fa8f453cc70cb272d0e7480f', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            
            if(data.success) {
                uploadedImageUrl = data.data.url;
                status.innerText = "✅ ფოტო მზადაა!";
                document.getElementById('submitBtn').disabled = false;
            }
        });

        // მონაცემების ბაზაში ჩაწერა
        document.getElementById('carForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newCar = {
                model: document.getElementById('model').value,
                price: document.getElementById('price').value,
                description: document.getElementById('description').value,
                image: uploadedImageUrl,
                time: Date.now()
            };

            push(carsRef, newCar).then(() => {
                alert("განცხადება წარმატებით დაემატა!");
                document.getElementById('carForm').reset();
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('uploadStatus').innerText = "ჯერ აირჩიეთ ფოტო";
            });
        });

        // მონაცემების წაკითხვა და გამოჩენა (Live)
        onValue(carsRef, (snapshot) => {
            const carGrid = document.getElementById('carGrid');
            carGrid.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                Object.values(data).reverse().forEach(car => {
                    const carCard = `
                        <div class="car-card">
                            <div class="car-img" style="background-image: url('${car.image}')"></div>
                            <div class="car-details">
                                <h3>${car.model}</h3>
                                <p class="car-price">$${car.price}</p>
                                <p class="car-desc">${car.description}</p>
                            </div>
                        </div>
                    `;
                    carGrid.innerHTML += carCard;
                });
            } else {
                carGrid.innerHTML = "<p>განცხადებები არ არის.</p>";
            }
        });
    </script>
</body>
</html>
