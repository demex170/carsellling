<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>AutoMarket | მთავარი</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AUTO<span>MARKET</span></div>
        <ul class="nav-links">
            <li><a href="index.html">მთავარი</a></li>
            <li><a href="catalog.html">კატალოგი</a></li>
            <li><button class="btn-sell" onclick="toggleModal('sellModal')">გაყიდე</button></li>
        </ul>
    </nav>

    <div class="hero">
        <h1>AUTO<span>MARKET</span></h1>
        <p>საქართველოს პრემიუმ ავტო-პლატფორმა</p>
    </div>

    <main class="container">
        <h2 class="section-title">პოპულარული <span>მოდელები</span></h2>
        <div class="car-grid">
            <div class="car-card">
                <div class="car-img" style="background-image:url('w211.jpg')"><div class="overlay"><h4>W211</h4><p>E-Class</p></div></div>
                <div class="car-details"><h3>Mercedes W211</h3><p class="car-price">18,000 $</p></div>
            </div>
            <div class="car-card">
                <div class="car-img" style="background-image:url('e60.jpg')"><div class="overlay"><h4>E60</h4><p>M5 V10</p></div></div>
                <div class="car-details"><h3>BMW M5 E60</h3><p class="car-price">28,000 $</p></div>
            </div>
            <div class="car-card">
                <div class="car-img" style="background-image:url('w218.jpg')"><div class="overlay"><h4>W218</h4><p>CLS AMG</p></div></div>
                <div class="car-details"><h3>Mercedes CLS</h3><p class="car-price">35,000 $</p></div>
            </div>
        </div>
    </main>

    <div id="sellModal" class="full-modal">
        <div class="modal-box">
            <span style="position:absolute; top:10px; right:20px; cursor:pointer;" onclick="toggleModal('sellModal')">&times;</span>
            <h2>გაყიდე მანქანა</h2>
            <form id="sellForm">
                <input type="text" id="mModel" placeholder="მოდელი" required>
                <input type="number" id="mYear" placeholder="წელი" required>
                <input type="number" id="mPrice" placeholder="ფასი ($)" required>
                <input type="tel" id="mPhone" placeholder="ნომერი" required>
                <input type="file" id="mFile" accept="image/*" required>
                <p id="status" style="font-size:12px; margin-top:5px; color:var(--accent)"></p>
                <button type="submit" id="subBtn" class="submit-btn" disabled>ატვირთვა</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyCx2sZJQqP8ni_dz9fuhJwKWJrHnKRjGdE",
            databaseURL: "https://automarket-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "automarket-2026",
            appId: "1:689194639330:web:db854d0dbfddded899a3bb"
        };
        const app = initializeApp(config);
        const db = getDatabase(app);

        const fileIn = document.getElementById('mFile');
        const sBtn = document.getElementById('subBtn');

        fileIn.onchange = async (e) => {
            document.getElementById('status').innerText = "სურათი მუშავდება...";
            const fd = new FormData(); fd.append('image', e.target.files[0]);
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=288f0f93fa8f453cc70cb272d0e7480f', {method:'POST', body:fd});
                const d = await res.json();
                if(d.success) {
                    window.imgUrl = d.data.url;
                    sBtn.disabled = false;
                    document.getElementById('status').innerText = "მზადაა გამოსაქვეყნებლად!";
                }
            } catch(err) { alert("შეცდომა სურათის ატვირთვისას"); }
        };

        document.getElementById('sellForm').onsubmit = async (e) => {
            e.preventDefault();
            const carData = {
                model: document.getElementById('mModel').value,
                year: document.getElementById('mYear').value,
                price: document.getElementById('mPrice').value,
                phone: document.getElementById('mPhone').value,
                image: window.imgUrl
            };
            await push(ref(db, 'cars'), carData);
            location.href = "catalog.html";
        };

        window.toggleModal = (id) => {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }
    </script>
</body>
</html>
