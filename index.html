<!DOCTYPE html>
<html lang="ka" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMarket | მთავარი</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">AUTO<span>MARKET</span></div>
            <ul class="nav-links">
                <li><a href="index.html">მთავარი</a></li>
                <li><a href="catalog.html">კატალოგი</a></li>
                <li><i class="fas fa-moon theme-toggle" id="themeBtn"></i></li>
                <li><a onclick="toggleModal('sellModal')" class="btn-sell">გაყიდე</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>იპოვე შენი საოცნებო ავტომობილი</h1>
        <div class="live-stats">ბაზაშია: <span id="carCount">0</span> მანქანა</div>
    </section>

    <main class="container">
        <h2 class="section-title">პოპულარული მოდელები</h2>
        <div class="car-grid">
            <script>
                const popData = [
                    {m: "Mercedes CLS W218", p: "35,000", i: "cls.jpg", d: "4.7L V8 Biturbo"},
                    {m: "BMW M5 E60", p: "28,000", i: "m5.jpg", d: "5.0L V10 S85"},
                    {m: "BMW M4 G82", p: "75,000", i: "m4.jpg", d: "3.0L S58"},
                    {m: "Bugatti La Voiture", p: "18,000,000", i: "bugatti.jpg", d: "8.0L W16"},
                    {m: "Porsche 911 GT3 RS", p: "350,000", i: "gt3rs.jpg", d: "4.0L Flat-6"},
                    {m: "Mercedes W211 E63", p: "18,000", i: "w211.jpg", d: "6.2L V8 M156"},
                    {m: "Mercedes CLS W219", p: "15,000", i: "w219.jpg", d: "5.5L V8 AMG"}
                ];
                popData.forEach(c => {
                    document.write(`
                        <div class="car-card">
                            <div class="car-img" style="background-image:url('${c.i}')">
                                <div class="overlay">
                                    <ul>
                                        <li><strong>მოდელი:</strong> ${c.m}</li>
                                        <li><strong>ძრავი:</strong> ${c.d}</li>
                                        <li><strong>საწვავი:</strong> ბენზინი</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="car-details"><h3>${c.m}</h3><p class="car-price">${c.p} $</p></div>
                        </div>
                    `);
                });
            </script>
        </div>

        <h2 class="section-title">განბაჟების კალკულატორი</h2>
        <div class="calc-box">
            <div class="calc-grid">
                <div><label>გამოშვების წელი</label><input type="number" id="cy" placeholder="2018"></div>
                <div><label>ძრავის მოცულობა</label><input type="number" id="ce" placeholder="2000"></div>
                <button class="submit-btn" onclick="calc()">გამოთვლა</button>
            </div>
            <h3 id="cr" style="text-align:center; margin-top:25px; color:var(--accent)"></h3>
        </div>
    </main>

    <div id="sellModal" class="full-modal">
        <div class="modal-box">
            <span class="close-modal" onclick="toggleModal('sellModal')">&times;</span>
            <h2 style="margin-bottom:20px">განცხადების დამატება</h2>
            <form id="sellForm">
                <input type="text" id="sm" placeholder="მოდელი" required style="margin-bottom:10px">
                <input type="number" id="sp" placeholder="ფასი ($)" required style="margin-bottom:10px">
                <input type="tel" id="st" placeholder="ტელეფონი" required style="margin-bottom:10px">
                <input type="file" id="si" accept="image/*" style="margin-bottom:10px">
                <img id="prev" style="display:none; width:100%; border-radius:10px; margin-bottom:10px">
                <button type="submit" id="sb" class="submit-btn" disabled>განთავსება</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx2sZJQqP8ni_dz9fuhJwKWJrHnKRjGdE",
            databaseURL: "https://automarket-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "automarket-2026",
            appId: "1:689194639330:web:db854d0dbfddded899a3bb"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'cars'), s => { document.getElementById('carCount').innerText = s.val() ? Object.keys(s.val()).length : 0; });

        const si = document.getElementById('si');
        si.onchange = async (e) => {
            const file = e.target.files[0];
            document.getElementById('prev').src = URL.createObjectURL(file);
            document.getElementById('prev').style.display = 'block';
            const fd = new FormData(); fd.append('image', file);
            const res = await fetch('https://api.imgbb.com/1/upload?key=288f0f93fa8f453cc70cb272d0e7480f', {method:'POST', body:fd});
            const d = await res.json();
            if(d.success) { window.u = d.data.url; document.getElementById('sb').disabled = false; }
        };

        document.getElementById('sellForm').onsubmit = (e) => {
            e.preventDefault();
            push(ref(db, 'cars'), {
                model: document.getElementById('sm').value,
                price: Number(document.getElementById('sp').value),
                phone: document.getElementById('st').value,
                image: window.u,
                isVIP: false,
                date: new Date().toLocaleDateString()
            }).then(() => location.href = "catalog.html");
        };
    </script>

    <script>
        function toggleModal(id) { const m = document.getElementById(id); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
        function calc() {
            const y = document.getElementById('cy').value;
            const e = document.getElementById('ce').value;
            if(!y || !e) return;
            const res = (e * (y > 2022 ? 1.5 : 0.9)).toFixed(0);
            document.getElementById('cr').innerText = `განბაჟება: ~ ${res} GEL`;
        }
        document.getElementById('themeBtn').onclick = () => {
            const d = document.documentElement;
            const isD = d.getAttribute('data-theme') === 'dark';
            d.setAttribute('data-theme', isD ? 'light' : 'dark');
            document.getElementById('themeBtn').className = isD ? 'fas fa-sun theme-toggle' : 'fas fa-moon theme-toggle';
        };
    </script>
</body>
</html>
