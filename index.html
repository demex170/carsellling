<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="7gnNmpFLTuYDG4OidgkN_LydZ8P175uiK7dJCeB1Ch8" />
    <title>AutoMarket | მთავარი</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* დამატებითი სტილები Auth-ისთვის */
        #auth-status { display: flex; align-items: center; gap: 10px; }
        .user-email { color: #ccc; font-size: 14px; }
        .btn-auth { background: transparent; border: 1px solid var(--accent); color: white; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
        .btn-auth:hover { background: var(--accent); }
        
        /* Modal სტილები Auth-ისთვის */
        .auth-form input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">AUTO<span>MARKET</span></div>
        <ul class="nav-links">
            <li><a href="index.html">მთავარი</a></li>
            <li><a href="catalog.html">კატალოგი</a></li>
            <li><a onclick="toggleModal('aboutModal')">ჩვენს შესახებ</a></li>
            <li><a onclick="toggleModal('supportModal')">Support</a></li>
            <li id="auth-status">
                <button class="btn-auth" onclick="toggleModal('loginModal')">შესვლა</button>
            </li>
            <li><button class="btn-sell" onclick="checkAuthAndSell()">გაყიდე</button></li>
        </ul>
    </nav>

    <div class="hero">
        <h1>AUTO<span>MARKET</span></h1>
        <p>ბიუჯეტური და პრემიუმ ავტომობილები</p>
    </div>

    <div id="loginModal" class="full-modal">
        <div class="modal-box auth-form">
            <span class="close-modal" onclick="toggleModal('loginModal')">&times;</span>
            <h2>ავტორი<span>ზაცია</span></h2>
            <form id="loginForm">
                <input type="email" id="lEmail" placeholder="ელ-ფოსტა" required>
                <input type="password" id="lPass" placeholder="პაროლი" required>
                <button type="submit" class="submit-btn">შესვლა</button>
            </form>
            <p style="margin-top:15px; font-size:14px;">არ გაქვს ანგარიში? <a href="#" onclick="openSignup()" style="color:var(--accent)">დარეგისტრირდი</a></p>
        </div>
    </div>

    <div id="signupModal" class="full-modal">
        <div class="modal-box auth-form">
            <span class="close-modal" onclick="toggleModal('signupModal')">&times;</span>
            <h2>რეგისტ<span>რაცია</span></h2>
            <form id="signupForm">
                <input type="email" id="sEmail" placeholder="ელ-ფოსტა" required>
                <input type="password" id="sPass" placeholder="პაროლი" required>
                <button type="submit" class="submit-btn">რეგისტრაცია</button>
            </form>
        </div>
    </div>

    <main class="container">
        <h2 class="section-title">პოპულარული <span>მოდელები</span></h2>
        <div class="car-grid">
            <div class="car-card" onclick="showSimple('Mercedes W211', '18,000 $', '2008', '3.2', 'w211.jpg')">
                <div class="car-img" style="background-image:url('w211.jpg')"><div class="overlay">ნახვა</div></div>
                <div class="car-details"><h3>Mercedes W211</h3><p class="car-price">18,000 $</p></div>
            </div>
            </div>
    </main>

    <div id="supportModal" class="full-modal">
        <div class="modal-box">
            <span class="close-modal" onclick="toggleModal('supportModal')">&times;</span>
            <h2>SUP<span>PORT</span></h2>
            <form action="https://formspree.io/f/xpqkjawy" method="POST">
                <select name="type" required><option value="Report">რეპორტი</option><option value="Problem">პრობლემა</option></select>
                <input type="email" name="email" placeholder="თქვენი მეილი" required>
                <textarea name="message" placeholder="როგორ დაგეხმაროთ?" required></textarea>
                <button type="submit" class="submit-btn">გაგზავნა</button>
            </form>
        </div>
    </div>

    <div id="sellModal" class="full-modal">
        <div class="modal-box">
            <span class="close-modal" onclick="toggleModal('sellModal')">&times;</span>
            <h2>გაყიდე <span>მანქანა</span></h2>
            <form id="sellForm">
                <div class="form-grid">
                    <input type="text" id="mOwner" placeholder="სახელი გვარი" required>
                    <input type="text" id="mModel" placeholder="მოდელი" required>
                    <input type="number" id="mYear" placeholder="წელი" required>
                    <input type="text" id="mEngine" placeholder="ძრავი" required>
                    <select id="mFuel" required>
                        <option value="ბენზინი">ბენზინი</option>
                        <option value="დიზელი">დიზელი</option>
                        <option value="ჰიბრიდი">ჰიბრიდი</option>
                        <option value="ელექტრო">ელექტრო</option>
                    </select>
                    <input type="number" id="mPrice" placeholder="ფასი $" required>
                    <input type="tel" id="mPhone" placeholder="ნომერი" required>
                    <textarea id="mInfo" placeholder="მინი ინფორმაცია..."></textarea>
                </div>
                <input type="file" id="mFile" accept="image/*" required>
                <p id="status" style="font-size:12px; color:#ff4b2b; text-align:center; margin-top:5px;"></p>
                <button type="submit" id="subBtn" class="submit-btn" disabled>გამოქვეყნება</button>
            </form>
        </div>
    </div>

    <div id="infoModal" class="full-modal">
        <div class="modal-box">
            <span class="close-modal" onclick="toggleModal('infoModal')">&times;</span>
            <img id="infoImg" style="width:100%; border-radius:15px;">
            <h2 id="infoTitle" style="margin-top:15px;"></h2>
            <div id="infoContent" style="margin-top:10px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const config = {
            apiKey: "AIzaSyAvkSEWqwWfVglImUmdacv7JTvhEc1uM7M",
            authDomain: "automarketgeo-22.firebaseapp.com",
            projectId: "automarketgeo-22",
            storageBucket: "automarketgeo-22.firebasestorage.app",
            messagingSenderId: "1011910422188",
            appId: "1:1011910422188:web:d8014b76ab240b8d0cf909"
        };

        const app = initializeApp(config);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Modal Logic
        window.toggleModal = (id) => {
            const m = document.getElementById(id);
            if (!m.classList.contains('active')) { m.style.display = 'flex'; setTimeout(() => m.classList.add('active'), 10); }
            else { m.classList.remove('active'); setTimeout(() => m.style.display = 'none', 300); }
        }

        window.openSignup = () => { toggleModal('loginModal'); toggleModal('signupModal'); }

        // Auth Logic
        document.getElementById('signupForm').onsubmit = (e) => {
            e.preventDefault();
            createUserWithEmailAndPassword(auth, document.getElementById('sEmail').value, document.getElementById('sPass').value)
                .then(() => { alert("რეგისტრაცია წარმატებულია!"); location.reload(); })
                .catch(err => alert("შეცდომა: " + err.message));
        };

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById('lEmail').value, document.getElementById('lPass').value)
                .then(() => { location.reload(); })
                .catch(err => alert("შეცდომა: " + err.message));
        };

        window.checkAuthAndSell = () => {
            if (auth.currentUser) { toggleModal('sellModal'); }
            else { alert("მანქანის გასაყიდად საჭიროა ავტორიზაცია!"); toggleModal('loginModal'); }
        };

        onAuthStateChanged(auth, (user) => {
            const statusBox = document.getElementById('auth-status');
            if (user) {
                statusBox.innerHTML = `
                    <span class="user-email">${user.email.split('@')[0]}</span>
                    <button class="btn-auth" onclick="auth.signOut().then(()=>location.reload())">გამოსვლა</button>
                `;
            }
        });

        // Car Selling Logic (ImgBB + Database)
        const fileIn = document.getElementById('mFile');
        fileIn.onchange = async (e) => {
            document.getElementById('status').innerText = "სურათი იტვირთება...";
            const fd = new FormData(); fd.append('image', e.target.files[0]);
            const res = await fetch('https://api.imgbb.com/1/upload?key=288f0f93fa8f453cc70cb272d0e7480f', {method:'POST', body:fd});
            const d = await res.json();
            if(d.success) { 
                window.imgUrl = d.data.url; 
                document.getElementById('subBtn').disabled = false; 
                document.getElementById('status').innerText = "სურათი მზადაა!"; 
            }
        };

        document.getElementById('sellForm').onsubmit = async (e) => {
            e.preventDefault();
            await push(ref(db, 'cars'), {
                owner: document.getElementById('mOwner').value,
                model: document.getElementById('mModel').value,
                year: document.getElementById('mYear').value,
                price: document.getElementById('mPrice').value,
                image: window.imgUrl,
                userId: auth.currentUser.uid,
                time: Date.now()
            });
            location.href = "catalog.html";
        };
        
        window.auth = auth; // Global access for signOut
    </script>
</body>
</html>
