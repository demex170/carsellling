<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMarket | პრემიუმ ავტო პორტალი</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">AUTO<span>MARKET</span></div>
            <ul class="nav-links">
                <li><a href="#">მთავარი</a></li>
                <li><a href="#catalog">კატალოგი</a></li>
                <li><a href="#sell" class="btn-sell">გაყიდე მანქანა</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>იპოვე შენი შემდეგი ავტომობილი</h1>
            <p>მარტივი ატვირთვა და სწრაფი გაყიდვა</p>
        </div>
    </section>

    <section id="sell" class="form-section">
        <div class="container">
            <div class="form-card">
                <h2>განცხადების განთავსება</h2>
                
                <form id="carForm" action="https://formspree.io/f/xqewlwnz" method="POST">
                    <div class="input-group">
                        <div class="field">
                            <label>მოდელი</label>
                            <input type="text" name="model" placeholder="მაგ: BMW M4" required>
                        </div>
                        <div class="field">
                            <label>ფასი ($)</label>
                            <input type="number" name="price" placeholder="მაგ: 35000" required>
                        </div>
                    </div>

                    <div class="field">
                        <label>ფოტოს ატვირთვა</label>
                        <input type="file" id="imageInput" accept="image/*" class="file-input">
                        <p id="uploadStatus">ფოტო არ არის არჩეული</p>
                        <input type="hidden" name="photo_link" id="photo_link" required>
                    </div>

                    <div class="field">
                        <label>აღწერა</label>
                        <textarea name="description" rows="4" placeholder="დაწერეთ მანქანის მდგომარეობაზე..."></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="submit-btn" disabled>გაგზავნა (ჯერ ატვირთეთ ფოტო)</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 AutoMarket - ყველა უფლება დაცულია</p>
    </footer>

    <script>
        const imageInput = document.getElementById('imageInput');
        const photoLinkInput = document.getElementById('photo_link');
        const statusText = document.getElementById('uploadStatus');
        const submitBtn = document.getElementById('submitBtn');

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusText.innerText = "მიმდინარეობს ატვირთვა... მოიცადეთ";
            statusText.style.color = "#ff3e3e";
            
            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('https://api.imgbb.com/1/upload?key=288f0f93fa8f453cc70cb272d0e7480f', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (data.success) {
                    photoLinkInput.value = data.data.url;
                    statusText.innerText = "✅ ფოტო წარმატებით აიტვირთა!";
                    statusText.style.color = "#4CAF50";
                    submitBtn.disabled = false;
                    submitBtn.innerText = "განცხადების გამოქვეყნება";
                } else {
                    statusText.innerText = "❌ ატვირთვა ვერ მოხერხდა";
                }
            } catch (error) {
                statusText.innerText = "❌ კავშირის შეცდომა";
            }
        });
    </script>
</body>
</html>
