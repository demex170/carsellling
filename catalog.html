<!DOCTYPE html>
<html lang="ka" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კატალოგი</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">AUTO<span>MARKET</span></div>
            <ul class="nav-links">
                <li><a href="index.html">მთავარი</a></li>
                <li><a href="catalog.html">კატალოგი</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="filters">
            <input type="text" id="search" placeholder="ძებნა..." oninput="filter()">
            <select id="pf" onchange="filter()">
                <option value="all">ყველა ფასი</option>
                <option value="0-15000">15,000$-მდე</option>
                <option value="15000+">15,000$ +</option>
            </select>
            <select id="so" onchange="filter()">
                <option value="new">უახლესი</option>
                <option value="low">ჯერ იაფი</option>
            </select>
        </div>

        <div id="catGrid" class="car-grid"></div>
    </main>

    <div id="detModal" class="full-modal">
        <div class="modal-box" style="max-width:800px">
            <span class="close-modal" onclick="toggleModal('detModal')">&times;</span>
            <div id="detContent"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx2sZJQqP8ni_dz9fuhJwKWJrHnKRjGdE",
            databaseURL: "https://automarket-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "automarket-2026",
            appId: "1:689194639330:web:db854d0dbfddded899a3bb"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allCars = [];
        let favs = JSON.parse(localStorage.getItem('favs')) || [];
        const admin = new URLSearchParams(window.location.search).get('admin') === '123';

        onValue(ref(db, 'cars'), s => {
            allCars = s.val() ? Object.entries(s.val()) : [];
            window.filter();
        });

        window.filter = () => {
            let f = [...allCars];
            const s = document.getElementById('search').value.toLowerCase();
            const p = document.getElementById('pf').value;
            const o = document.getElementById('so').value;

            f = f.filter(([id, c]) => c.model.toLowerCase().includes(s));
            if(p === '0-15000') f = f.filter(([id, c]) => c.price <= 15000);
            if(p === '15000+') f = f.filter(([id, c]) => c.price > 15000);
            if(o === 'low') f.sort((a,b) => a[1].price - b[1].price);

            const grid = document.getElementById('catGrid');
            grid.innerHTML = f.map(([id, c]) => {
                const isF = favs.includes(id);
                return `
                    <div class="car-card ${c.isVIP ? 'vip-card' : ''}" onclick="showDet('${id}')">
                        <div class="car-img" style="background-image:url('${c.image}')">
                            <i class="${isF ? 'fas' : 'far'} fa-heart fav-btn" onclick="event.stopPropagation(); toggleFav('${id}')"></i>
                            <div class="overlay">
                                <p>თარიღი: ${c.date}</p>
                                <p>ტელ: ${c.phone}</p>
                            </div>
                        </div>
                        <div class="car-details">
                            <h3>${c.model}</h3>
                            <p class="car-price">${c.price} $</p>
                            ${admin ? `<button onclick="event.stopPropagation(); remove(ref(db, 'cars/${id}'))" style="color:red; background:none; border:1px solid red; width:100%; padding:5px; margin-top:10px; cursor:pointer">წაშლა</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        };

        window.toggleFav = (id) => {
            if(favs.includes(id)) favs = favs.filter(i => i !== id);
            else favs.push(id);
            localStorage.setItem('favs', JSON.stringify(favs));
            window.filter();
        };

        window.showDet = (id) => {
            const c = allCars.find(i => i[0] === id)[1];
            document.getElementById('detContent').innerHTML = `
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px">
                    <img src="${c.image}" style="width:100%; border-radius:10px">
                    <div>
                        <h2>${c.model}</h2>
                        <h1 style="color:var(--accent); margin:15px 0">${c.price} $</h1>
                        <p>გამყიდველის ნომერი: ${c.phone}</p>
                        <a href="tel:${c.phone}" class="submit-btn" style="display:block; text-align:center; text-decoration:none; margin-top:20px">დარეკვა</a>
                        <a href="https://wa.me/${c.phone}" class="wa-btn" target="_blank">WhatsApp</a>
                    </div>
                </div>
            `;
            window.toggleModal('detModal');
        };

        window.toggleModal = (id) => { const m = document.getElementById(id); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; };
    </script>
</body>
</html>
