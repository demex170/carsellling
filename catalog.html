<div class="search-container">
    <input type="text" id="searchInput" class="search-bar" placeholder="მოძებნე მანქანა (მაგ: BMW)...">
</div>
<div id="carList" class="car-grid"></div>

<script type="module">
    // ... (Firebase initialization იგივეა) ...
    const carList = document.getElementById('carList');
    const searchInput = document.getElementById('searchInput');
    let allCars = [];

    // მონაცემების წამოღება
    get(ref(db, 'cars')).then((snap) => {
        allCars = snap.val() ? Object.entries(snap.val()) : [];
        displayCars(allCars);
    });

    // ძებნის ლოგიკა
    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allCars.filter(([id, car]) => car.model.toLowerCase().includes(term));
        displayCars(filtered);
    });

    function displayCars(cars) {
        carList.innerHTML = "";
        cars.forEach(([id, car]) => {
            carList.innerHTML += `
                <div class="car-card">
                    <div class="car-img" style="background-image: url('${car.image}')"></div>
                    <div class="car-details">
                        <h3>${car.model}</h3>
                        <p class="car-price">${car.price} $</p>
                        <p>📞 ${car.phone}</p>
                        <p>⚙️ ${car.condition}</p>
                    </div>
                </div>`;
        });
    }
</script>
