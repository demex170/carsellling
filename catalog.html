<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMarket | კატალოგი</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">AUTO<span>MARKET</span></div>
            <ul class="nav-links">
                <li><a href="index.html">მთავარი</a></li>
                <li><a href="catalog.html">კატალოგი</a></li>
            </ul>
        </nav>
    </header>

    <div class="search-container" style="margin-top: 100px; text-align: center;">
        <input type="text" id="searchInput" class="search-bar" placeholder="მოძებნე მოდელი...">
    </div>

    <main class="container">
        <div id="carList" class="car-grid"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx2sZJQqP8ni_dz9fuhJwKWJrHnKRjGdE",
            databaseURL: "https://automarket-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "automarket-2026",
            appId: "1:689194639330:web:db854d0dbfddded899a3bb"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const carList = document.getElementById('carList');
        const searchInput = document.getElementById('searchInput');
        let allCars = [];

        onValue(ref(db, 'cars'), (snap) => {
            allCars = snap.val() ? Object.entries(snap.val()) : [];
            render(allCars);
        });

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allCars.filter(([id, car]) => car.model.toLowerCase().includes(term));
            render(filtered);
        });

        function render(cars) {
            carList.innerHTML = "";
            cars.forEach(([id, car]) => {
                carList.innerHTML += `
                    <div class="car-card">
                        <div class="car-img" style="background-image: url('${car.image}'); background-size: cover; background-position: center; height: 200px;"></div>
                        <div class="car-details">
                            <h3>${car.model}</h3>
                            <p class="car-price">${car.price} $</p>
                            <p style="font-size: 13px; color: #888;">📞 ${car.phone} | ⚙️ ${car.condition}</p>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
