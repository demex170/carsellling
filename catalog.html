<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>AutoMarket | კატალოგი</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AUTO<span>MARKET</span></div>
        <ul class="nav-links">
            <li><a href="index.html">მთავარი</a></li>
            <li><a href="catalog.html">კატალოგი</a></li>
        </ul>
    </nav>

    <main class="container">
        <h2 class="section-title">ყველა <span>განცხადება</span></h2>
        <div id="catGrid" class="car-grid"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyCx2sZJQqP8ni_dz9fuhJwKWJrHnKRjGdE",
            databaseURL: "https://automarket-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "automarket-2026",
            appId: "1:689194639330:web:db854d0dbfddded899a3bb"
        };
        const app = initializeApp(config);
        const db = getDatabase(app);
        const grid = document.getElementById('catGrid');

        onValue(ref(db, 'cars'), (snap) => {
            const data = snap.val();
            grid.innerHTML = ""; 
            if(!data) return;
            
            // სორტირება დროს მიხედვით (ახალი პირველი)
            Object.values(data).sort((a,b) => b.timestamp - a.timestamp).forEach(car => {
                grid.innerHTML += `
                    <div class="car-card">
                        <div class="car-img" style="background-image:url('${car.image}')"><div class="overlay">ნახვა</div></div>
                        <div class="car-details">
                            <h3>${car.model}</h3>
                            <p class="car-price">${car.price} $</p>
                            <p style="color:#777; font-size:14px; margin-top:5px;">${car.phone}</p>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
