<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>AutoMarket | კატალოგი</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AUTO<span>MARKET</span></div>
        <ul class="nav-links">
            <li><a href="index.html">მთავარი</a></li>
            <li><a href="catalog.html" style="color: var(--accent);">კატალოგი</a></li>
            <li><a onclick="window.location.href='index.html#aboutModal'">ჩვენს შესახებ</a></li>
        </ul>
    </nav>

    <main class="container">
        <h2 class="section-title">ყველა განცხადება</h2>
        <div id="catGrid" class="car-grid"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // შენი Firebase კონფიგურაცია
        const config = {
            apiKey: "AIzaSyCx2sZJQqP8ni_dz9fuhJwKWJrHnKRjGdE",
            databaseURL: "https://automarket-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "automarket-2026",
            appId: "1:689194639330:web:db854d0dbfddded899a3bb"
        };

        const app = initializeApp(config);
        const db = getDatabase(app);
        const grid = document.getElementById('catGrid');

        // მონაცემების წამოღება რეალურ დროში
        onValue(ref(db, 'cars'), (snapshot) => {
            const data = snapshot.val();
            grid.innerHTML = ""; // გასუფთავება

            if (!data) {
                grid.innerHTML = "<h3 style='grid-column: 1/-1; text-align: center; color: #555;'>განცხადებები ჯერჯერობით არ არის.</h3>";
                return;
            }

            // მონაცემების შებრუნება (რომ ახალი პირველი გამოჩნდეს)
            Object.entries(data).reverse().forEach(([id, car]) => {
                const card = document.createElement('div');
                card.className = 'car-card';

                card.innerHTML = `
                    <div class="car-img" style="background-image:url('${car.image}')">
                        <div class="overlay">
                            <h4>${car.model}</h4>
                            <p>${car.year || 'N/A'} წელი</p>
                            <a href="tel:${car.phone}" style="color: white; text-decoration: none; margin-top: 10px; border: 1px solid white; padding: 5px 15px; border-radius: 5px;">
                                <i class="fas fa-phone"></i> დარეკვა
                            </a>
                        </div>
                    </div>
                    <div class="car-details">
                        <h3>${car.model}</h3>
                        <p style="color: #777; font-size: 13px; margin-bottom: 5px;">${car.year} წელი | ${car.fuel || 'ბენზინი'}</p>
                        <p class="car-price">${car.price} $</p>
                        <p style="margin-top: 10px; font-weight: bold; color: var(--text);">${car.phone}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        });
    </script>
</body>
</html>
