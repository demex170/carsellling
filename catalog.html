<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>AutoMarket | კატალოგი</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AUTO<span>MARKET</span></div>
        <ul class="nav-links"><li><a href="index.html">მთავარი</a></li><li><a href="catalog.html">კატალოგი</a></li></ul>
    </nav>

    <main class="container">
        <h2 class="section-title">ყველა <span>განცხადება</span></h2>
        <div id="catGrid" class="car-grid"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyCx2sZJQqP8ni_dz9fuhJwKWJrHnKRjGdE",
            databaseURL: "https://automarket-2026-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "automarket-2026",
            appId: "1:689194639330:web:db854d0dbfddded899a3bb"
        };
        const app = initializeApp(config);
        const db = getDatabase(app);
        
        const params = new URLSearchParams(window.location.search);
        const isAdmin = params.get('admin') === '123';

        window.deleteCar = (id) => { if(confirm("წავშალო?")) remove(ref(db, 'cars/'+id)); };

        onValue(ref(db, 'cars'), (snap) => {
            const data = snap.val();
            const grid = document.getElementById('catGrid');
            grid.innerHTML = "";
            if(!data) return;
            Object.keys(data).reverse().forEach(id => {
                const car = data[id];
                const delBtn = isAdmin ? `<button class="delete-btn" onclick="deleteCar('${id}')">წაშლა</button>` : "";
                grid.innerHTML += `
                    <div class="car-card">
                        <div class="car-img" style="background-image:url('${car.image}')"></div>
                        <div class="car-details">
                            <h3>${car.model}</h3>
                            <p class="car-price">${car.price} $</p>
                            <p style="color:#666; font-size:13px;">${car.phone}</p>
                            ${delBtn}
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
